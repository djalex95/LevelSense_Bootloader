name: Build & Release Bootloader

# Release wird durch einen Versions-Tag ausgelöst (z. B. v1.0.0).
# Push auf main baut KEIN Release mehr.
# Tag muss zur BL_VERSION in Core/Inc/boot_dfu.h passen.
# Achtung: Der Bootloader wird per ST-Link geflasht, nicht per OTA.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version ermitteln
        id: ver
        run: |
          bl=$(grep -oP '^#define\s+BL_VERSION\s+"\K[^"]+' Core/Inc/boot_dfu.h | head -n1)
          echo "bl=$bl" >> "$GITHUB_OUTPUT"
          echo "Bootloader-Version: $bl"

      - name: Tag == boot_dfu.h prüfen
        if: github.ref_type == 'tag'
        run: |
          test "${GITHUB_REF_NAME#v}" = "${{ steps.ver.outputs.bl }}" \
            || { echo "::error::Tag ${GITHUB_REF_NAME} passt nicht zu BL_VERSION ${{ steps.ver.outputs.bl }}"; exit 1; }

      - name: ARM-Toolchain installieren
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Bootloader bauen
        run: make -j4

      - name: .bin + .hex benennen
        run: |
          mkdir -p dist
          cp build/bootloader.bin "dist/Bootloader_v${{ steps.ver.outputs.bl }}.bin"
          cp build/bootloader.hex "dist/Bootloader_v${{ steps.ver.outputs.bl }}.hex"

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.bl }}
          name: Bootloader v${{ steps.ver.outputs.bl }}
          body: |
            Automatisch gebaut. Flashen per ST-Link nach 0x08000000 (nicht per OTA).
            - Bootloader_v${{ steps.ver.outputs.bl }}.bin
            - Bootloader_v${{ steps.ver.outputs.bl }}.hex (mit Adresse)
          files: |
            dist/Bootloader_v*.bin
            dist/Bootloader_v*.hex
